<head>

    <style>
        /* Base Setup & Colors */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0c0c0c;
            color: #ffffff;
            padding-bottom: 5px;
        }

        /* Top Header Styling */
        header {
            background: linear-gradient(180deg, #e50914 0%, #b20710 100%);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        header h1 {
            font-size: 28px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        /* Navigation Tabs & Search Bar Container */
        .nav-container {
            background-color: #141414;
            padding: 12px 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            border-bottom: 2px solid #222;
        }

        /* Horizontal Scrollable Menu for Mobile Phones */
        .main-nav {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            width: 100%;
            padding-bottom: 5px;
            white-space: nowrap;
            scrollbar-width: none; /* Hides scrollbar on Firefox */
        }

        .main-nav::-webkit-scrollbar {
            display: none; /* Hides scrollbar on Chrome/Safari */
        }

        .nav-item {
            color: #aaaaaa;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            padding: 6px 14px;
            border-radius: 20px;
            background-color: #222;
            transition: all 0.3s ease;
        }

        .nav-item.active, .nav-item:hover {
            color: #ffffff;
            background-color: #e50914;
        }

        /* Search Input Styling */
        .search-box {
            display: flex;
            width: 100%;
            max-width: 450px;
        }

        .search-box input {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 4px 0 0 4px;
            outline: none;
            background-color: #222;
            color: white;
            font-size: 14px;
        }

        .search-box button {
            padding: 10px 20px;
            background-color: #e50914;
            color: white;
            border: none;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .search-box button:hover {
            background-color: #b20710;
        }

        /* Media Grid System */
        .content-section {
            padding: 20px;
        }

        .section-title {
            font-size: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #e50914;
            padding-left: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        /* Individual Movie/Game Card Setup */
        .media-card {
            background-color: #1a1a1a;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }

        .media-card:hover {
            transform: scale(1.03);
        }

        .media-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: #333; /* Placeholder color if image fails */
        }

        .media-info {
            padding: 10px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .media-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
            line-height: 1.2;
            height: 34px; /* Fixes layout heights */
            overflow: hidden;
        }

        /* Shortened Ad Link Button */
        .download-btn {
            display: block;
            background-color: #e50914;
            color: white;
            text-decoration: none;
            text-align: center;
            padding: 8px 0;
            font-size: 12px;
            font-weight: bold;
            border-radius: 4px;
            transition: background 0.2s;
            text-transform: uppercase;
        }

        .download-btn:hover {
            background-color: #b20710;
        }

        /* Message shown when search results are blank */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 30px;
            color: #888;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <script>
        // Real-Time Search Logic
        function searchFunction() {
            let input = document.getElementById('movieSearch').value.toLowerCase();
            let cards = document.getElementsByClassName('media-card');
            let visibleCount = 0;

            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].getAttribute('data-title');
                if (title.includes(input)) {
                    cards[i].style.display = "";
                    visibleCount++;
                } else {
                    cards[i].style.display = "none";
                }
            }

            // Remove previous error notice if it exists
            let oldNotice = document.getElementById('noMatchNotice');
            if (oldNotice) oldNotice.remove();

            // Display fallback message if nothing matches
            if (visibleCount === 0) {
                let grid = document.getElementById('catalogGrid');
                let notice = document.createElement('div');
                notice.id = 'noMatchNotice';
                notice.className = 'no-results';
                notice.innerText = 'No movies or games match your search term.';
                grid.appendChild(notice);
            }
        }

        // Genre and Categories Filtering Logic
        function filterGenre(genre, element) {
            let cards = document.getElementsByClassName('media-card');
            let displayTitle = document.getElementById('displayTitle');
            
            // Switch highlight indicator class on navigation links
            let navItems = document.getElementsByClassName('nav-item');
            for(let i=0; i < navItems.length; i++) {
                navItems[i].classList.remove('active');
            }
            element.classList.add('active');

            // Update visible cards matching data-genre attribute
            for (let i = 0; i < cards.length; i++) {
                let cardGenre = cards[i].getAttribute('data-genre');
                if (genre === 'all' || cardGenre === genre) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }

            // Set Title dynamically
            displayTitle.innerText = genre === 'all' ? "All Catalog Items" : genre + " Selection";
            
            // Clear input box during genre changes
            document.getElementById('movieSearch').value = "";
            let oldNotice = document.getElementById('noMatchNotice');
            if (oldNotice) oldNotice.remove();
